<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basit XOX Oyunu</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Basit XOX</h1>
      <div class="status" id="status">Sıra: X</div>
      <div class="board" id="board" role="grid" aria-label="XOX Tahtası">
        <button class="cell" data-index="0" aria-label="Hücre 1" role="gridcell"></button>
        <button class="cell" data-index="1" aria-label="Hücre 2" role="gridcell"></button>
        <button class="cell" data-index="2" aria-label="Hücre 3" role="gridcell"></button>
        <button class="cell" data-index="3" aria-label="Hücre 4" role="gridcell"></button>
        <button class="cell" data-index="4" aria-label="Hücre 5" role="gridcell"></button>
        <button class="cell" data-index="5" aria-label="Hücre 6" role="gridcell"></button>
        <button class="cell" data-index="6" aria-label="Hücre 7" role="gridcell"></button>
        <button class="cell" data-index="7" aria-label="Hücre 8" role="gridcell"></button>
        <button class="cell" data-index="8" aria-label="Hücre 9" role="gridcell"></button>
      </div>
      <div class="actions">
        <button id="reset">Sıfırla</button>
      </div>
    </main>
    <script src="./script.js"></script>
  </body>
  </html>
